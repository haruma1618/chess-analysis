<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Analysis Engine (Stockfish)</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        :root {
            --bg-dark: #221e24;
            --panel-bg: #2e2735;
            --border-color: #4c3f52;
            --text-main: #f5f5f5;
            --text-muted: #b0b0b5;
            --accent-green: #4caf50;
            --accent-gold: #ffb74d;
        }

        body {
            font-family: "Candara";
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            /*max-width: 1100px;*/
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .board-wrapper {
            flex: 1;
            min-width: 360px;
            max-width: 540px;
        }

        .panel-wrapper {
            flex: 1;
            min-width: 240px;
            max-width: 360px;
            background-color: var(--panel-bg);
            /*border-radius: 8px; I hate rounded borders*/
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 80vh;
        }

        #panel-wrapper-left {
            min-width: 200px;
            max-width: 300px;
            padding: 15px;
        }

        #moves-wrapper-left {
            border-width: 2px 0 2px 0;
            border-color: var(--border-color) black var(--bg-dark) black;
            border-style: solid;
            display: flex;
            flex: 1;
            overflow-y: auto;
        }

        .moves-col {
            width: 50%;
            margin: 0;
        }

        #moves-white > .move-div {
            border-width: 0 2px 2px 2px;
        }

        #moves-black > .move-div {
            border-width: 0 2px 2px 0;
        }
        
        .move-div {
            border-color: var(--border-color);
            border-style: solid;
            padding: 3px;
        }

        .move-selected {
            background-color: #87599d;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .flex-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"], input[type="number"] {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            /*border-radius: 4px;*/
            font-size: 0.95rem;
        }

        input[type="text"] {
            flex-grow: 1;
        }

        button {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 8px 12px;
            /*border-radius: 4px;*/
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #439a46;
        }

        .status-bar {
            font-size: 0.9rem;
            color: var(--text-muted);
            background-color: var(--bg-dark);
            padding: 8px 12px;
            /*border-radius: 4px;*/
            border-left: 4px solid var(--accent-green);
        }

        .analysis-box {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            /*border-radius: 4px;*/
            padding: 15px;
            flex-grow: 1;
            min-height: 220px;
            max-height: 300px;
            overflow-y: auto;
        }

        .analysis-line {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border-color);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .line-meta {
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .line-score {
            color: var(--accent-gold);
            font-weight: bold;
            background: rgba(255, 183, 77, 0.1);
            padding: 2px 6px;
            /*border-radius: 3px;*/
            margin-right: 5px;
        }

        .line-pv {
            color: var(--text-main);
            /*word-break: break-all;*/
        }

        .white-1e1d7 {
            background-color: hsl(93, 28%, 80%) !important;
        }

        .black-3c85d {
            background-color: hsl(94, 24%, 41%) !important;
        }

        .highlight1-32417, .highlight2-9c5d2 {
            box-shadow: inset 0 0 2px 2px hsl(60, 100%, 50%);
        }

        .highlight-move {
            box-shadow: inset 0 0 2px 2px hsl(90, 100%, 50%);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="panel-wrapper" id="panel-wrapper-left">
        <div style="font-size: 14px">Starting position:&nbsp;
            <span id="start-position-text"></span>
        </div>
        <div id="moves-wrapper-left">
            <div class="moves-col" id="moves-white"></div>
            <div class="moves-col" id="moves-black"></div>
        </div>
    </div>

    <div class="board-wrapper">
        <div id="chess-board" style="width: 100%"></div>
    </div>

    <div class="panel-wrapper">
        <!--<h2>Engine Dashboard</h2>-->
        
        <div class="status-bar" id="status-display">White to move. Ready.</div>

        <div class="control-group" style="flex-grow: 1;">
            <div>
                <button id="toggle-analysis" style="background-color: #b83333" onclick="toggleAnalysis()">Stop</button>
            </div>
            <div class="analysis-box" id="analysis-output">
                Waiting for engine initialization...
            </div>
        </div>

        <div class="control-group">
            <label for="fen-input">IMPORT POSITION (FEN)</label>
            <div>
                <input type="text" id="fen-input" placeholder="rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1">
                <button style="margin-left: 5px" onclick="importFEN()">Import</button>
                <button style="margin-left: 5px" onclick="resetFEN()">Reset</button>
            </div>
        </div>

        <div class="control-group">
            <label for="multipv-input">ANALYSIS LINES (MultiPV)</label>
            <input type="number" id="multipv-input" value="3" min="1" max="5" style="width: 80px;" onchange="handleMultiPVChange()">
        </div>
    </div>
</div>

<script src="coi-serviceworker.min.js"></script>
<script>
    let board = null;
    let game = new Chess();
    let stockfish = null;
    let currentLines = {};
    const startFEN = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
    let analysisOn = true;
    let prevFEN;
    let prevMultiPV;
    const redoStack = [];

    // --- Configuration Details for Stockfish 18 ---
    // Modern Stockfish implementations (v16+) use WebAssembly (WASM) splits.
    // For universal browser execution without configuration issues, we use a hosted worker endpoint.
    // If you download Stockfish 18 files locally, replace this string with your local worker script filename (e.g., "./stockfish.js")
    const STOCKFISH_WORKER_URL = "stockfish-18.js";

    function initStockfish() {
        try {
            stockfish = new Worker(STOCKFISH_WORKER_URL);
            
            // Listen for engine responses
            stockfish.onmessage = function(event) {
                parseEngineOutput(event.data);
                console.log(event.data);
            };

            // Initialize Universal Chess Interface (UCI)
            stockfish.postMessage("uci");
            stockfish.postMessage("isready");
            stockfish.postMessage("setoption name Threads value 12");
            //stockfish.postMessage("setoption name Hash value 128");
            stockfish.postMessage(`setoption name MultiPV value ${document.getElementById("multipv-input").value}`);
            
            document.getElementById("analysis-output").innerHTML = "Loading Stockfish 18 (108MB WASM)...";
    
            startAnalysis();
        } catch (error) {
            document.getElementById("analysis-output").innerHTML = "Error initializing Stockfish Web Worker. Ensure you are running through a local web server environment.";
            console.error(error);
        }
    }

    function convertPVToSAN(pvString) {
        if (!pvString) return "";
        
        // Setup a temporary sandbox game matching our current position
        let tempGame = new Chess(game.fen());
        let uciMoves = pvString.split(/\s+/);
        let sanMoves = [];

        for (let i = 0; i < uciMoves.length; i++) {
            let uci = uciMoves[i];
            if (!uci) continue;

            let from = uci.substring(0, 2);
            let to = uci.substring(2, 4);
            let promotion = uci.length === 5 ? uci.substring(4, 5) : undefined;

            // Determine turn mechanics and move counter before execution
            let turn = tempGame.turn();
            let moveNum = parseInt(tempGame.fen().split(" ")[5]);
            let prefix = "";

            if (turn === "w") {
                prefix = moveNum + ". ";
            } else if (i === 0) {
                // If the engine calculation string leads directly with a black move
                prefix = moveNum + "... ";
            }

            // Execute move on the sandbox board
            let move = tempGame.move({ from: from, to: to, promotion: promotion });
            
            if (move) {
                sanMoves.push(prefix + move.san);
            } else {
                // console.log(uciMoves);
                break;
            }
        }
        return sanMoves.join(" ");
    }

    // Process standard UCI protocol strings emitted from Stockfish
    function parseEngineOutput(line) {
        if (line.startsWith("info") && line.includes("multipv")) {
            const tokens = line.split(/\s+/);
            if (tokens.includes("upperbound") || tokens.includes("lowerbound")) return;
            
            const mpvIndex = tokens[tokens.indexOf("multipv") + 1];
            const depthIndex = tokens.indexOf("depth");
            const depth = depthIndex !== -1 ? tokens[depthIndex + 1] : "?";
            
            // Evaluate Score
            let scoreStr = "0.00";
            if (tokens.includes("cp")) {
                const cpVal = parseInt(tokens[tokens.indexOf("cp") + 1]);
                // Shift evaluation display perspective based on active player turn
                let scoreValue = (cpVal / 100).toFixed(2) * (game.turn() === "b" ? -1 : 1);
                scoreStr = scoreValue > 0 ? `+${scoreValue}` : scoreValue;
            } else if (tokens.includes("mate")) {
                const mateVal = tokens[tokens.indexOf("mate") + 1] * (game.turn() === "b" ? -1 : 1);
                scoreStr = `M#${mateVal}`;
            }

            // Extract Projected Moves List (Principal Variation)
            const pvIndex = tokens.indexOf("pv");
            let moves = "";
            if (pvIndex !== -1) {
                moves = tokens.slice(pvIndex + 1).join(" ");
            }
            
            // Prevent very short lines from being shown
            if (parseInt(depth) > 10 && moves.split(" ").length < 4) return;

            // Update collection object
            currentLines[mpvIndex] = {
                depth: depth,
                score: scoreStr,
                pv: convertPVToSAN(moves)
            };

            renderAnalysisDisplay();
        }
    }

    function renderAnalysisDisplay() {
        const displayBox = document.getElementById("analysis-output");
        displayBox.innerHTML = "";

        // Sort lines logically based on rankings
        const sortedLines = Object.keys(currentLines).sort((a, b) => a - b);
        
        let moveText = "";
        if (game.history().length > 0) {
            moveText = "&nbsp;(" + Math.floor((game.history().length+1)/2) + (game.history().length%2==1 ? ". " : "... ") + game.history().at(-1) + ")";
        }

        const depthDisp = document.createElement("div");
        depthDisp.classList.add("line-meta");
        displayBox.appendChild(depthDisp);
        let minDepth = 100;

        sortedLines.forEach(key => {
            const data = currentLines[key];
            if (data.pv == "") return;

            const lineItem = document.createElement("div");
            lineItem.className = "analysis-line";

            const movesToShow = 6;

            let pvFirstMove = data.pv.split(" ").slice(0, 2).join(" ");
            let slicedPv = data.pv.split(" ").slice(2, movesToShow*3 - game.history().length%2).join(" ");

            //console.log(data.score);        
            if (parseInt(data.depth) < minDepth) {
                minDepth = parseInt(data.depth);
            }    

            lineItem.innerHTML = `
                <span class="line-score">${data.score}</span>
                <span class="line-pv">
                    <span style="color:#fc9; font-weight:bold">${pvFirstMove}</span>&nbsp;${slicedPv}
                </span>
            `;
            displayBox.appendChild(lineItem);
        });

        depthDisp.innerHTML = `Depth ${minDepth} ${moveText}`;
    }

    function startAnalysis(/*restart=true*/) {
        if (!stockfish) return;
        if (!analysisOn) return;

        // Reset previous processing actions
        stockfish.postMessage("stop");
        currentLines = {};
        
        // Pass preferences to engine configuration parameters
        if (prevFEN != game.fen()) {
            stockfish.postMessage(`position fen ${game.fen()}`);
            prevFEN = game.fen();
        }

        stockfish.postMessage("go depth 99");
    }

    function toggleAnalysis() {
        if (!stockfish) return;

        if (analysisOn) {
            analysisOn = !analysisOn;

            stockfish.postMessage("stop");
            document.getElementById("toggle-analysis").innerText = "Start";
            document.getElementById("toggle-analysis").style.backgroundColor = "#439a46";
        } else {
            analysisOn = !analysisOn;

            startAnalysis();
            document.getElementById("toggle-analysis").innerText = "Stop";
            document.getElementById("toggle-analysis").style.backgroundColor = "#b83333";
        }
    }

    // --- Move Validation Rules (Chessboard.js integration) ---
    function onDragStart(source, piece, position, orientation) {
        if (game.game_over()) return false;

        // Prevent active side dragging opposite color units
        if ((game.turn() === "w" && piece.search(/^b/) !== -1) ||
            (game.turn() === "b" && piece.search(/^w/) !== -1)) {
            return false;
        }
    }

    function onDrop(source, target) {
        // Evaluate legal parameters
        let turn = game.turn();

        let move = game.move({
            from: source,
            to: target,
            promotion: "q"
        });

        if (move === null) return "snapback";

        //console.log(move);
        if (move.promotion) {
            game.undo();
            let promType = prompt("Promotion type (q/r/n/b):");
            if (!(["q", "r", "n", "b"].includes(promType))) {
                promType = "q";
            }

            let move = game.move({
                from: source,
                to: target,
                promotion: promType
            });
        }

        $("#chess-board .square-55d63").removeClass("highlight-move");
        $("#chess-board .square-" + source).addClass("highlight-move");
        $("#chess-board .square-" + target).addClass("highlight-move");

        // Remove overwritten move elems
        let moveElems = Array.from(document.getElementsByClassName("move-div"));
        for (let i = 0; i < moveElems.length; i++) {
            let elem = moveElems[i];
            console.log("Elem: " + elem.innerText + " " + elem.getAttribute("moveNum") + " " + (game.history().length-1));
            if (parseInt(elem.getAttribute("moveNum")) >= game.history().length-1) {
                elem.remove();
            }
        }

        let moveElem = document.createElement("div");
        moveElem.innerText = move.san + " ";
        moveElem.classList.add("move-div");
        moveElem.setAttribute("moveNum", game.history().length-1);

        if (turn === "w") {
            moveElem.innerText = (game.history().length+1)/2 + ". " + moveElem.innerText;
            document.getElementById("moves-white").appendChild(moveElem);
        } else {
            document.getElementById("moves-black").appendChild(moveElem);
        }

        document.getElementById("analysis-output").innerHTML = "";
        updateMoveHighlight();
        updateGameStatus();
        startAnalysis();
    }

    function updateMoveHighlight() {
        let prevSelected = document.getElementsByClassName("move-selected");
        for (let elem of prevSelected) {
            elem.classList.remove("move-selected");
        }

        let moveElems = document.getElementsByClassName("move-div");
        for (let elem of moveElems) {
            if (parseInt(elem.getAttribute("moveNum")) === game.history().length-1) {
                elem.classList.add("move-selected");
                break;
            }
        }
    }

    function onSnapEnd() {
        board.position(game.fen());
    }

    function updateGameStatus() {
        let text = "";
        const sideToMove = game.turn() === "w" ? "White" : "Black";

        if (game.in_checkmate()) {
            text = `Game over. ${sideToMove} is in checkmate.`;
        } else if (game.in_draw()) {
            text = "Game over. Draw position reached.";
        } else {
            text = `${sideToMove} to move.`;
            if (game.in_check()) text += " (In Check!)";
        }

        document.getElementById("status-display").textContent = text;
        document.getElementById("fen-input").value = game.fen();
    }

    // --- Action Inputs UI Hooks ---
    function importFEN(fen) {
        if (fen === undefined) {
            fen = document.getElementById("fen-input").value.trim();
        }
        
        if (game.load(fen)) {
            board.position(fen);
            updateGameStatus();
            startAnalysis();

            document.getElementById("analysis-output").innerHTML = "";
            document.getElementById("moves-white").replaceChildren();
            document.getElementById("moves-black").replaceChildren();
            document.getElementById("start-position-text").innerText = fen;
            $("#chess-board .square-55d63").removeClass("highlight-move");
        } else {
            alert("Invalid FEN layout string. Please verify formatting syntax.");
        }
    }

    function resetFEN() {
        importFEN(startFEN);
    }

    function handleMultiPVChange() {
        // Enforce basic user constraints limits
        const target = document.getElementById("multipv-input");
        if (target.value < 1) target.value = 1;
        if (target.value > 5) target.value = 5;

        const linesRequested = target.value;
        stockfish.postMessage(`setoption name MultiPV value ${linesRequested}`);
        
        startAnalysis();
    }

    function undoMove() {
        const move = game.undo();
        if (move) {
            redoStack.push(move);
            board.position(game.fen());
            startAnalysis();
            updateMoveHighlight();
            $("#chess-board .square-55d63").removeClass("highlight-move");

            return move;
        }
        return null;
    }

    function redoMove() {
        if (redoStack.length > 0) {
            const move = redoStack.pop();
            game.move( {from: move.from, to: move.to, promotion: move.promotion} );
            board.position(game.fen());
            startAnalysis();
            updateMoveHighlight();
            $("#chess-board .square-55d63").removeClass("highlight-move");
            $("#chess-board .square-" + move.from).addClass("highlight-move");
            $("#chess-board .square-" + move.to).addClass("highlight-move");

            return move;
        }
        return null;
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "ArrowLeft") {
            console.log("undo");
            undoMove();
        } else if (e.key === "ArrowRight") {
            console.log("redo");
            redoMove();
        }
    });

    // Initialization hook
    $(document).ready(function() {
        board = Chessboard("chess-board", {
            draggable: true,
            pieceTheme: "piece-images/{piece}.png",
            position: "start",
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd
        });

        resetFEN();
        updateGameStatus();
        initStockfish();
    });
</script>

</body>
</html>
